name: Sync GitHub to Gitee

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: sync-gitee-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          GIT_TERMINAL_PROMPT: 0
        run: |
          if [ -z "$GITEE_USERNAME" ] || [ -z "$GITEE_TOKEN" ] || [ -z "$GITEE_REPO" ]; then
            echo "Missing required secrets: GITEE_USERNAME, GITEE_TOKEN, GITEE_REPO"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add gitee "https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          echo "Syncing branch ${GITHUB_REF_NAME} to Gitee..."
          # First sync can be slower on Gitee; retry to reduce transient network failures.
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3..."
            if timeout 600s git push gitee "HEAD:${GITHUB_REF_NAME}" --force; then
              echo "Sync completed."
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Push failed, retrying in 10s..."
              sleep 10
            fi
          done

          echo "Sync failed after 3 attempts."
          exit 1
